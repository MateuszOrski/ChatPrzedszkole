version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: chat-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: weechat_root
      MONGO_INITDB_ROOT_PASSWORD: weechat_password
    ports:
      - "21345:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
