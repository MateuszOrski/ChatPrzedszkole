spring.application.name=weechat-backend

# Log all HTTP requests (RequestLoggingFilter)
logging.level.com.weetalk.chat.config.RequestLoggingFilter=INFO

spring.mongodb.host=${MONGO_HOST:localhost}
spring.mongodb.port=${MONGO_PORT:21345}
spring.mongodb.authentication-database=${MONGO_AUTH_DB:admin}
spring.mongodb.username=${MONGO_USERNAME:weechat_root}
spring.mongodb.password=${MONGO_PASSWORD:weechat_password}
spring.mongodb.database=${MONGO_DATABASE:weechat}

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:54321/weechat_db}
spring.datasource.username=${POSTGRES_USERNAME:weechat_user}
spring.datasource.password=${POSTGRES_PASSWORD:weechat_password}

spring.flyway.baseline-on-migrate=true

security.jwt.secret=${JWT_SECRET:change-me}
security.jwt.access-expiration-seconds=${JWT_ACCESS_EXPIRATION_SECONDS:300}
security.jwt.refresh-expiration-seconds=${JWT_REFRESH_EXPIRATION_SECONDS:2592000}
security.jwt.cookie.access-name=${JWT_COOKIE_ACCESS_NAME:weechat_access}
security.jwt.cookie.refresh-name=${JWT_COOKIE_REFRESH_NAME:weechat_refresh}
security.jwt.cookie.secure=${JWT_COOKIE_SECURE:false}
security.jwt.cookie.same-site=${JWT_COOKIE_SAME_SITE:Lax}
security.jwt.cookie.domain=${JWT_COOKIE_DOMAIN:}
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://test.dersivative.eu,http://test.dersivative.eu,http://localhost:5173,http://localhost:3000,http://localhost:8080}

media.base-url.avatar=${MEDIA_BASE_URL_AVATAR:http://localhost:8080/media/avatars}
media.base-url.image=${MEDIA_BASE_URL_IMAGE:http://localhost:8080/media/images}
media.base-url.file=${MEDIA_BASE_URL_FILE:http://localhost:8080/media/files}
media.base-url.audio=${MEDIA_BASE_URL_AUDIO:http://localhost:8080/media/audio}
media.base-url.video=${MEDIA_BASE_URL_VIDEO:http://localhost:8080/media/video}

moderation.pl-guard.base-url=${PL_GUARD_BASE_URL:http://localhost:8001}
moderation.pl-guard.timeout-ms=${PL_GUARD_TIMEOUT_MS:10000}
